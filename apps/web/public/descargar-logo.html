<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Descargar logo Gestai</title>
  <style>
    body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
    canvas { border-radius: 16px; margin-bottom: 24px; }
    button { background: #f59e0b; color: #000; border: none; padding: 14px 32px; border-radius: 99px; font-size: 16px; font-weight: 700; cursor: pointer; }
    button:hover { background: #fbbf24; }
  </style>
</head>
<body>
  <canvas id="c" width="500" height="500"></canvas>
  <button onclick="download()">⬇ Descargar PNG</button>

  <script>
    const canvas = document.getElementById('c')
    const ctx = canvas.getContext('2d')

    function draw() {
      // Fondo
      ctx.fillStyle = '#080706'
      roundRect(ctx, 0, 0, 500, 500, 80)
      ctx.fill()

      // Ícono (ondas)
      const cx = 250, cy = 185, scale = 9

      // Onda exterior (opaca)
      ctx.beginPath()
      ctx.moveTo(cx - 10*scale/2, cy + 2*scale)
      ctx.quadraticCurveTo(cx, cy - 10*scale, cx + 10*scale/2, cy + 2*scale)
      ctx.strokeStyle = 'rgba(245,158,11,0.4)'
      ctx.lineWidth = 2.2 * scale * 0.38
      ctx.lineCap = 'round'
      ctx.stroke()

      // Onda interior
      ctx.beginPath()
      ctx.moveTo(cx - 6*scale/2, cy + 0.5*scale)
      ctx.quadraticCurveTo(cx, cy - 6*scale, cx + 6*scale/2, cy + 0.5*scale)
      ctx.strokeStyle = '#f59e0b'
      ctx.lineWidth = 2.2 * scale * 0.38
      ctx.lineCap = 'round'
      ctx.stroke()

      // Punto
      ctx.beginPath()
      ctx.arc(cx, cy + 2.2 * scale * 0.9, 2.2 * scale * 0.42, 0, Math.PI * 2)
      ctx.fillStyle = '#f59e0b'
      ctx.fill()

      // Texto
      ctx.fillStyle = '#f5f5f4'
      ctx.font = '500 88px Arial'
      ctx.letterSpacing = '4px'
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      ctx.fillText('gestai', 250, 360)
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath()
      ctx.moveTo(x + r, y)
      ctx.lineTo(x + w - r, y)
      ctx.quadraticCurveTo(x + w, y, x + w, y + r)
      ctx.lineTo(x + w, y + h - r)
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h)
      ctx.lineTo(x + r, y + h)
      ctx.quadraticCurveTo(x, y + h, x, y + h - r)
      ctx.lineTo(x, y + r)
      ctx.quadraticCurveTo(x, y, x + r, y)
      ctx.closePath()
    }

    function download() {
      const link = document.createElement('a')
      link.download = 'gestai-logo.png'
      link.href = canvas.toDataURL('image/png')
      link.click()
    }

    draw()
  </script>
</body>
</html>
